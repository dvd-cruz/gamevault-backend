# ── PostgreSQL ───────────────────────────────────────────────────────────────
# Local:  mvn spring-boot:run -Dspring-boot.run.profiles=postgres
# Deploy: SPRING_PROFILES_ACTIVE=postgres + variáveis de ambiente abaixo.
# Os fallbacks (depois dos :) servem para desenvolvimento local.

# Render fornece host/port/database/user/password em separado (render.yaml -> fromDatabase).
# Se DATABASE_URL estiver definido usa-se diretamente; caso contrario compoe-se a partir dos componentes.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gamevault}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:123}

# Em cloud (Render/etc.) a porta vem da variavel PORT.
server.port=${PORT:8080}

# CORS — em deploy define app.cors.allowed-origins=https://gamevault.cc
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Pool de ligações — valores conservadores para planos cloud pequenos
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:5}
spring.datasource.hikari.connection-timeout=30000

# ── JPA ──────────────────────────────────────────────────────────────────────
# update: mantém dados entre arranques, adiciona colunas novas automaticamente
# create-drop: recria tudo de raiz (útil para reset)
# Para schema gerido a sério em produção, migrar depois para Flyway/Liquibase.
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Desativar H2 ─────────────────────────────────────────────────────────────
spring.h2.console.enabled=false

# ── Uploads ──────────────────────────────────────────────────────────────────
# Em deploy aponta para um volume persistente (ex: /data/uploads).
app.uploads.dir=${UPLOADS_DIR:uploads}

# ── Seed data ────────────────────────────────────────────────────────────────
# true localmente para teres os dados demo; em deploy define SEED_ENABLED=false
# (os utilizadores demo têm passwords conhecidas — não os queres em produção).
app.seed.enabled=${SEED_ENABLED:true}

# ── JWT ──────────────────────────────────────────────────────────────────────
# Em deploy define JWT_SECRET (256-bit, base64) — NUNCA usar a chave de dev.
app.jwt.secret=${JWT_SECRET:Z2FtZXZhdWx0LXNlY3JldC1rZXktMjAyNi1kZXYtb25seS1jaGFuZ2UtZW0tcHJvZHVjYW8=}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
