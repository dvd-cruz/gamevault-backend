# ── SERVER ──────────────────────────────────────────────────────────────────
server.port=8080
server.tomcat.max-http-form-post-size=10MB

# ── UPLOADS (imagens guardadas em disco, servidas em /uploads/**) ────────────
app.uploads.dir=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# ── DATASOURCE (H2 dev — change profile for PostgreSQL) ─────────────────────
spring.datasource.url=jdbc:h2:mem:gamevault;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA ─────────────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── H2 CONSOLE (http://localhost:8080/h2-console) ────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JACKSON ─────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ── JWT ──────────────────────────────────────────────────────────────────────
# Chave de 256-bit em base64 — muda em produção!
app.jwt.secret=Z2FtZXZhdWx0LXNlY3JldC1rZXktMjAyNi1kZXYtb25seS1jaGFuZ2UtZW0tcHJvZHVjYW8=
app.jwt.expiration=86400000

# ── STEAM WEB API ────────────────────────────────────────────────────────────
# Obtém uma chave gratuita em https://steamcommunity.com/dev/apikey
app.steam.api-key=${STEAM_API_KEY:}
app.steam.api-base-url=https://api.steampowered.com
